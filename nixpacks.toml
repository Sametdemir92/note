[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build",
  "cp -r public .next/standalone/ || true",
  "cp -r .next/static .next/standalone/.next/ || true"
]

[start]
cmd = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
